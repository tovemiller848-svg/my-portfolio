<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>叶湘榕 | 个人作品集</title>
    
    <script src="https://cdn.staticfile.org/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.staticfile.org/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.staticfile.org/babel-standalone/7.21.4/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.loli.net/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { background-color: #050505; margin: 0; overflow: hidden; cursor: none; }
        .font-sans { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* 玻璃拟态面板 */
        .glass-panel { 
            background: rgba(255, 255, 255, 0.04); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        /* 软件图标动效 */
        .software-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
        }
        .software-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
            border-color: rgba(218, 32, 90, 0.5);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #DA205A; border-radius: 10px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }

        @media (max-width: 768px) {
            body { cursor: auto; }
            #cursor { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const THEME = { primary: '#DA205A' };

        // 核心数据：确保一个字都不少
        const SOFTWARE_TOOLS = [
            { name: 'Ps', color: '#31A8FF' }, { name: 'Ai', color: '#FF9A00' },
            { name: 'CAD', color: '#FF4C4C' }, { name: '秀米', color: '#FF5959' },
            { name: 'Canva', color: '#00C4CC' }, { name: 'AIGC', color: '#8B5CF6' }
        ];

        const SKILLS = [
            { title: '视觉与图形设计', desc: 'Photoshop, Illustrator, Canva' },
            { title: 'AIGC 辅助设计', desc: 'AI Design Tools, Efficiency' },
            { title: '数据分析与监控', desc: 'Data Review, Analysis' },
            { title: '运营统筹与排版', desc: '秀米, Word, Excel, PowerPoint' }
        ];

        const PROJECTS = [
            { 
                id: 1, title: '品牌ip形象设计', img: './yunda_cover.jpg', desc: 'Ps/Gemini/Lovart',
                details: ['./yunda_cover.jpg', './yunda_2.jpg', './yunda_3.jpg', './yunda_4.jpg', './yunda_5.jpg', './yunda_6.jpg', './yunda_7.jpg', './yunda_8.jpg']
            },
            { 
                id: 2, title: '企业宣传手册设计', img: './layout-1.jpg', desc: 'Ps/Deepseek',
                details: ['./layout-1.jpg', './layout-2.jpg', './layout-3.jpg', './layout-4.jpg', './layout-5.jpg', './layout-6.jpg']
            },
            { 
                id: 3, title: '公众号运营', img: './666shots-so.png', desc: '可画/秀米/135编辑器',
                isCustom: true,
                sections: [
                    { title: '海报设计', sub: '公众号视觉', role: '设计', color: '#2DDB84', img: './666shots-so.png', desc: '提取核心元素进行视觉重构。' },
                    { title: '排版案例', sub: '公众号推文', role: '排版', color: '#FFD166', img: './guoqin1.jpg', isScroll: true, desc: '模块化设计与视觉动线引导。' },
                    { title: '& 尾部交互', sub: '活动转化', role: '链路', color: '#FF5E3A', img: './3.png', desc: '将普通链接转化为交互入口。' }
                ]
            }
        ];

        function App() {
            const [heroOp, setHeroOp] = useState(1);
            const [bgOp, setBgOp] = useState(0);
            const [text, setText] = useState('');
            const [activeProj, setActiveProj] = useState(null);
            const starRef = useRef(null);
            const waveRef = useRef(null);
            const mouse = useRef({ x: -1000, y: -1000, active: false });

            // 1. 打字机
            useEffect(() => {
                let i = 0; const full = "艺术设计学";
                const t = setInterval(() => { setText(full.slice(0, i)); i++; if(i > full.length) clearInterval(t); }, 150);
                return () => clearInterval(t);
            }, []);

            // 2. 灵魂星星引擎
            useEffect(() => {
                const cvs = starRef.current; const ctx = cvs.getContext('2d');
                let w, h; const isMob = window.innerWidth < 768;
                const count = isMob ? 150 : 800;
                
                // 离屏渲染五角星
                const starCache = document.createElement('canvas');
                starCache.width = 30; starCache.height = 30;
                const sctx = starCache.getContext('2d');
                sctx.fillStyle = THEME.primary;
                sctx.beginPath();
                for(let i=0; i<10; i++) {
                    const r = i%2===0 ? 14 : 6;
                    const a = Math.PI*2/10*i - Math.PI/2;
                    sctx.lineTo(15+Math.cos(a)*r, 15+Math.sin(a)*r);
                }
                sctx.fill();

                const pts = [];
                for(let i=0; i<count; i++) {
                    const r = 450 * Math.cbrt(Math.random());
                    const t = Math.random()*Math.PI*2;
                    const p = Math.acos(Math.random()*2-1);
                    pts.push({ ox: r*Math.sin(p)*Math.cos(t), oy: r*Math.sin(p)*Math.sin(t), oz: r*Math.cos(p), wx:0, wy:0, wz:0, vx:0, vy:0, vz:0, sz: Math.random()*1.5+1 });
                }

                const resize = () => { w = cvs.width = window.innerWidth; h = cvs.height = window.innerHeight; };
                window.addEventListener('resize', resize); resize();
                const move = (e) => { mouse.current = { x: e.clientX, y: e.clientY, active: true }; };
                window.addEventListener('mousemove', move);

                let ang = 0;
                const frame = () => {
                    ang += 0.001; ctx.clearRect(0,0,w,h);
                    pts.forEach(p => {
                        const cosY = Math.cos(ang), sinY = Math.sin(ang);
                        const tx = p.ox*cosY - p.oz*sinY, tz = p.ox*sinY + p.oz*cosY;
                        p.vx += (tx - p.wx)*0.02; p.vy += (p.oy - p.wy)*0.02; p.vz += (tz - p.wz)*0.02;
                        if(mouse.current.active && !isMob) {
                            const sc = 550/(550+p.wz), sx = p.wx*sc+w/2, sy = p.wy*sc+h/2;
                            const dx = sx-mouse.current.x, dy = sy-mouse.current.y;
                            const dist = Math.sqrt(dx*dx+dy*dy);
                            if(dist < 150) { p.vx += dx/dist*5; p.vy += dy/dist*5; }
                        }
                        p.vx*=0.9; p.vy*=0.9; p.vz*=0.9; p.wx+=p.vx; p.wy+=p.vy; p.wz+=p.vz;
                        const sc = 550/(550+p.wz), x = p.wx*sc+w/2, y = p.wy*sc+h/2;
                        ctx.globalAlpha = Math.max(0, sc-0.2);
                        ctx.drawImage(starCache, x-10*sc, y-10*sc, 20*sc, 20*sc);
                    });
                    requestAnimationFrame(frame);
                };
                frame();
            }, []);

            // 3. 波浪线引擎
            useEffect(() => {
                const cvs = waveRef.current; const ctx = cvs.getContext('2d');
                let w, h, t = 0;
                const resize = () => { w = cvs.width = window.innerWidth; h = cvs.height = window.innerHeight; };
                resize(); window.addEventListener('resize', resize);
                const frame = () => {
                    t += 0.005; ctx.fillStyle = '#050505'; ctx.fillRect(0,0,w,h);
                    for(let i=0; i<12; i++) {
                        ctx.beginPath();
                        const by = h*0.2 + (h*0.7/12)*i;
                        for(let x=0; x<=w; x+=30) {
                            const y = by + Math.sin(x*0.002 + t + i*0.3)*40;
                            if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                        }
                        ctx.strokeStyle = `rgba(218,32,90,${0.05 + i*0.01})`;
                        ctx.lineWidth = 1; ctx.stroke();
                    }
                    requestAnimationFrame(frame);
                };
                frame();
            }, []);

            return (
                <div onScroll={(e) => {
                    const s = e.target.scrollTop;
                    setHeroOp(Math.max(0, 1 - s/500));
                    setBgOp(Math.min(1, s/400));
                }} className="relative w-full h-screen overflow-y-auto overflow-x-hidden custom-scrollbar bg-black">
                    
                    <canvas ref={starRef} className="fixed inset-0 z-10 pointer-events-none" style={{opacity: heroOp}} />
                    <canvas ref={waveRef} className="fixed inset-0 z-0 pointer-events-none" style={{opacity: bgOp}} />

                    <main className="relative z-20">
                        {/* 英雄页 */}
                        <section className="h-screen flex flex-col items-center justify-center text-center">
                            <h1 className="font-sans font-black text-[12vw] md:text-[10vw] text-white uppercase leading-tight">个人作品集<br/><span className="text-[#DA205A]">网站</span></h1>
                            <p className="font-mono text-gray-400 mt-6 tracking-[0.4em] text-lg uppercase">{text}_</p>
                        </section>

                        {/* 关于我 */}
                        <section id="about" className="py-24 px-6 max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-12">
                            <div className="md:col-span-4 sticky top-24">
                                <div className="glass-panel p-8 rounded-3xl text-center">
                                    <div className="w-40 h-52 mx-auto rounded-xl overflow-hidden mb-6 bg-white/5">
                                        <img src="./zheng-jian-zhao.jpg" className="w-full h-full object-cover" />
                                    </div>
                                    <h3 className="text-3xl font-black text-white">叶湘榕</h3>
                                    <div className="grid grid-cols-3 gap-2 mt-8">
                                        {SOFTWARE_TOOLS.map(s => (
                                            <div key={s.name} className="software-card aspect-square rounded-lg flex items-center justify-center font-bold text-xs" style={{color: s.color}}>{s.name}</div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <div className="md:col-span-8 space-y-12">
                                <div className="glass-panel p-8 rounded-2xl border-l-4 border-[#DA205A]">
                                    <h2 className="text-2xl font-black text-white mb-2">福建江夏学院</h2>
                                    <p className="text-[#DA205A] font-mono mb-4 text-sm">艺术设计学 | 2022 - 2026</p>
                                    <p className="text-gray-400 text-sm leading-relaxed">主修：设计调研方法、消费者行为学、空间可视化、企业考察等。</p>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    {SKILLS.map(s => (
                                        <div key={s.title} className="glass-panel p-6 rounded-xl">
                                            <h4 className="text-[#DA205A] font-bold text-sm mb-2">{s.title}</h4>
                                            <p className="text-gray-500 text-xs font-mono">{s.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* 作品集 */}
                        <section id="work" className="py-24 px-6 max-w-7xl mx-auto">
                            <h2 className="text-5xl md:text-7xl font-black text-white uppercase mb-16 tracking-tighter">精选作品.</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {PROJECTS.map(p => (
                                    <div key={p.id} onClick={() => setActiveProj(p)} className="glass-panel rounded-2xl overflow-hidden cursor-pointer group transition-transform hover:scale-[1.02]">
                                        <div className="h-60 overflow-hidden"><img src={p.img} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" /></div>
                                        <div className="p-6 bg-[#0a0a0a]"><h3 className="text-white font-bold text-xl">{p.title}</h3><p className="text-[10px] text-gray-500 font-mono mt-1">{p.desc}</p></div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* 联系 */}
                        <footer id="contact" className="py-32 border-t border-white/5 space-y-16">
                            <h2 className="text-center text-4xl font-black text-white tracking-widest uppercase">联系我</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl mx-auto px-6">
                                {[ {l:'Phone', v:'13655004586'}, {l:'Email', v:'13655004586@163.com'}, {l:'WeChat', v:'kotove03012'} ].map(i => (
                                    <div key={i.l} className="glass-panel p-8 rounded-2xl text-center">
                                        <span className="text-gray-500 text-[10px] font-mono uppercase tracking-widest">{i.l}</span>
                                        <div className="text-white font-bold mt-2 break-all">{i.v}</div>
                                    </div>
                                ))}
                            </div>
                        </footer>
                    </main>

                    {/* 详情弹窗 */}
                    {activeProj && (
                        <div className="fixed inset-0 z-[100] flex justify-center items-center">
                            <div className="absolute inset-0 bg-black/95 backdrop-blur-xl" onClick={() => setActiveProj(null)}></div>
                            <div className="relative w-full max-w-6xl h-[90vh] bg-[#050505] overflow-y-auto border border-white/10 rounded-2xl custom-scrollbar">
                                <div className="p-8 md:p-16">
                                    <h2 className="text-4xl font-black text-white mb-12">{activeProj.title}</h2>
                                    {!activeProj.isCustom ? (
                                        <div className="space-y-8 pb-10">
                                            {activeProj.details.map((img, i) => <img key={i} src={img} className="w-full rounded-xl" loading="lazy" />)}
                                        </div>
                                    ) : (
                                        <div className="space-y-32 pb-10">
                                            {activeProj.sections.map((s, i) => (
                                                <div key={i} className="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                                                    <div className={`bg-[#0a0a0a] rounded-2xl overflow-y-auto border border-white/5 ${s.isScroll ? 'h-[60vh]' : 'h-auto'}`}>
                                                        <img src={s.img} className="w-full h-auto" loading="lazy" />
                                                    </div>
                                                    <div className="space-y-6">
                                                        <h4 className="font-black text-2xl uppercase" style={{color: s.color}}>{s.sub}</h4>
                                                        <p className="text-gray-400 font-mono leading-relaxed">{s.desc}</p>
                                                        <div className="text-white font-bold">Role: {s.role}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <button className="absolute top-6 right-6 text-white text-3xl hover:text-[#DA205A]" onClick={() => setActiveProj(null)}>✕</button>
                            </div>
                        </div>
                    )}

                    <div id="cursor" className="fixed top-0 left-0 w-3 h-3 bg-[#DA205A] rounded-full pointer-events-none z-[1000] shadow-[0_0_15px_#DA205A]"></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        document.addEventListener('mousemove', (e) => {
            const c = document.getElementById('cursor');
            if(c) c.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
        });
    </script>
</body>
</html>

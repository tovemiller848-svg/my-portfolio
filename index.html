<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>叶湘榕 | 个人作品集</title>
    
    <script src="https://cdn.staticfile.org/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.staticfile.org/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.staticfile.org/babel-standalone/7.21.4/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.loli.net/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { background-color: #050505; margin: 0; overflow: hidden; cursor: none; }
        .font-sans { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .glass-panel { 
            background: rgba(255, 255, 255, 0.04); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.06); 
        }

        .software-card-premium {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .software-card-premium:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-3px) scale(1.05);
            border-color: rgba(218, 32, 90, 0.4);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #DA205A; border-radius: 10px; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }

        @media (max-width: 768px) {
            body { cursor: auto; }
            #cursor { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const THEME = { bg: '#050505', primary: '#DA205A' };

        // 1. 完整找回所有数据
        const SOFTWARE_TOOLS = [
            { name: 'Ps', color: '#31A8FF', shadow: 'rgba(49, 168, 255, 0.3)' },
            { name: 'Ai', color: '#FF9A00', shadow: 'rgba(255, 154, 0, 0.3)' },
            { name: 'CAD', color: '#FF4C4C', shadow: 'rgba(255, 76, 76, 0.3)' },
            { name: '秀米', color: '#FF5959', shadow: 'rgba(255, 89, 89, 0.3)' },
            { name: 'Canva', color: '#00C4CC', shadow: 'rgba(0, 196, 204, 0.3)' },
            { name: 'AIGC', color: '#8B5CF6', shadow: 'rgba(139, 92, 246, 0.3)' }
        ];

        const SKILL_SYSTEM = [
            { title: '视觉与图形设计', details: 'Photoshop, Illustrator, Canva' },
            { title: 'AIGC 辅助设计', details: 'AI Design Tools, Efficiency' },
            { title: '数据分析与监控', details: 'Data Review, Analysis' },
            { title: '运营统筹与排版', details: '秀米, Word, Excel, PowerPoint' }
        ];

        const PROJECTS = [
            { id: 1, title: '品牌ip形象设计', img: './yunda_cover.jpg', desc: 'Ps/Gemini/Lovart', detailImages: ['./yunda_cover.jpg', './yunda_2.jpg', './yunda_3.jpg', './yunda_4.jpg', './yunda_5.jpg', './yunda_6.jpg', './yunda_7.jpg', './yunda_8.jpg'] },
            { id: 2, title: '企业宣传手册设计', img: './layout-1.jpg', desc: 'Ps/Deepseek', detailImages: ['./layout-1.jpg', './layout-2.jpg', './layout-3.jpg', './layout-4.jpg', './layout-5.jpg', './layout-6.jpg'] },
            { 
                id: 3, title: '公众号运营', img: 'https://images.unsplash.com/photo-1561070791-2526d30994b5?q=80&w=1000&auto=format&fit=crop', desc: '可画/秀米/135编辑器',
                customSections: [
                    { subTitle: '公众号视觉', title: '海报设计', desc: '结合现代排版进行视觉重构。', role: '设计', titleColor: '#2DDB84', imageUrl: './666shots-so.png' },
                    { subTitle: '公众号推文', title: '排版案例', desc: '模块化设计与视觉动线引导。', role: '排版', titleColor: '#FFD166', imageUrl: './guoqin1.jpg' },
                    { subTitle: '活动转化', title: '& 交互设计', desc: '将普通链接转化为交互入口。', role: '链路设计', titleColor: '#FF5E3A', imageUrl: './3.png' }
                ]
            }
        ];

        function App() {
            const [heroOpacity, setHeroOpacity] = useState(1);
            const [typedText, setTypedText] = useState('');
            const [selectedProject, setSelectedProject] = useState(null);
            const heroCanvasRef = useRef(null);
            const opacityRef = useRef(1);
            const interactionRef = useRef({ x: -1000, y: -1000, ndcX: 0, ndcY: 0, active: false });

            // 打字机效果
            useEffect(() => {
                let i = 0; const full = "艺术设计学";
                const timer = setInterval(() => { setTypedText(full.slice(0, i)); i++; if(i > full.length) clearInterval(timer); }, 150);
                return () => clearInterval(timer);
            }, []);

            // 高性能粒子交互系统（找回星星灵魂）
            useEffect(() => {
                const canvas = heroCanvasRef.current;
                const ctx = canvas.getContext('2d');
                let width, height;
                const isMobile = window.innerWidth < 768;
                const particleCount = isMobile ? 150 : 800;

                const points = [];
                for (let i = 0; i < particleCount; i++) {
                    const radius = 450 * Math.cbrt(Math.random());
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(Math.random() * 2 - 1);
                    points.push({ 
                        ox: radius * Math.sin(phi) * Math.cos(theta), oy: radius * Math.sin(phi) * Math.sin(theta), oz: radius * Math.cos(phi),
                        wx: 0, wy: 0, wz: 0, vx: 0, vy: 0, vz: 0, phase: Math.random() * Math.PI * 2, size: Math.random() * 2 + 1 
                    });
                }

                const resize = () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; };
                window.addEventListener('resize', resize); resize();

                const handleMove = (e) => {
                    interactionRef.current = { x: e.clientX, y: e.clientY, ndcX: (e.clientX / width) * 2 - 1, ndcY: (e.clientY / height) * 2 - 1, active: true };
                };
                window.addEventListener('mousemove', handleMove);

                let angle = 0;
                const render = () => {
                    angle += 0.001;
                    ctx.clearRect(0, 0, width, height);
                    const fov = 550;
                    const { x: mx, y: my, ndcX, ndcY, active } = interactionRef.current;

                    points.forEach(p => {
                        // 3D 旋转计算
                        const cosY = Math.cos(angle + ndcX * 0.05), sinY = Math.sin(angle + ndcX * 0.05);
                        const cosX = Math.cos(ndcY * 0.05), sinX = Math.sin(ndcY * 0.05);
                        let tx = p.ox * cosY - p.oz * sinY;
                        let tz = p.ox * sinY + p.oz * cosY;
                        let ty = p.oy * cosX - tz * sinX;
                        let finalZ = p.oy * sinX + tz * cosX;

                        // 弹性跟随
                        p.vx += (tx - p.wx) * 0.02; p.vy += (ty - p.wy) * 0.02; p.vz += (finalZ - p.wz) * 0.02;
                        
                        // 鼠标避让交互
                        if (active && !isMobile) {
                            const sc = fov / (fov + p.wz);
                            const sx = p.wx * sc + width/2, sy = p.wy * sc + height/2;
                            const dx = sx - mx, dy = sy - my;
                            const dSq = dx*dx + dy*dy;
                            if (dSq < 160 * 160) {
                                const dist = Math.sqrt(dSq);
                                const force = (160 - dist) / 160;
                                p.vx += (dx / dist) * force * 10; p.vy += (dy / dist) * force * 10;
                            }
                        }

                        p.vx *= 0.88; p.vy *= 0.88; p.vz *= 0.88;
                        p.wx += p.vx; p.wy += p.vy; p.wz += p.vz;

                        const sc = fov / (fov + p.wz);
                        const x = p.wx * sc + width/2, y = p.wy * sc + height/2;
                        ctx.globalAlpha = Math.max(0, opacityRef.current * (sc - 0.2));
                        ctx.fillStyle = THEME.primary;
                        ctx.fillRect(x, y, p.size * sc, p.size * sc);
                    });
                    requestAnimationFrame(render);
                };
                render();
                return () => window.removeEventListener('mousemove', handleMove);
            }, []);

            return (
                <div onScroll={(e) => { const op = Math.max(0, 1 - e.target.scrollTop / 500); setHeroOpacity(op); opacityRef.current = op; }} className="relative w-full h-screen overflow-y-auto overflow-x-hidden custom-scrollbar bg-[#050505]">
                    <canvas ref={heroCanvasRef} className="fixed inset-0 w-full h-full pointer-events-none z-10" />
                    
                    <main className="relative z-20">
                        {/* 1. 英雄页 */}
                        <section className="h-screen flex flex-col items-center justify-center text-center px-4">
                            <h1 className="font-sans font-black text-[10vw] text-white uppercase leading-none drop-shadow-2xl">个人作品集<br/><span style={{color: THEME.primary}}>网站</span></h1>
                            <p className="font-mono text-gray-300 mt-8 tracking-[0.5em] text-lg uppercase">{typedText}_</p>
                        </section>

                        {/* 2. 完整关于我：头像、教育、工具、技能 */}
                        <section className="py-24 px-6 max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-16">
                            <div className="md:col-span-4 sticky top-24">
                                <div className="glass-panel p-8 rounded-3xl text-center">
                                    <div className="w-full aspect-[3/4] rounded-2xl overflow-hidden mb-6 bg-white/5 border border-white/10 shadow-2xl">
                                        <img src="./zheng-jian-zhao.jpg" className="w-full h-full object-cover" />
                                    </div>
                                    <h3 className="text-3xl font-black text-white">叶湘榕</h3>
                                    <p className="text-[#DA205A] font-mono text-xs mt-2 uppercase tracking-widest font-bold">Designer / 2003.12.23</p>
                                    
                                    <div className="grid grid-cols-3 gap-3 mt-8">
                                        {SOFTWARE_TOOLS.map((tool, i) => (
                                            <div key={i} className="software-card-premium aspect-square rounded-xl flex items-center justify-center">
                                                <span className="font-sans font-black text-sm" style={{ color: tool.color }}>{tool.name}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <div className="md:col-span-8 flex flex-col gap-12">
                                <div>
                                    <h2 className="text-4xl font-black text-white mb-8 uppercase tracking-tighter border-b border-white/10 pb-4">教育背景</h2>
                                    <div className="glass-panel p-8 rounded-2xl border-l-4 border-[#DA205A]">
                                        <h4 className="text-2xl text-white font-bold mb-2">福建江夏学院 | 艺术设计学</h4>
                                        <p className="text-gray-500 font-mono mb-4">2022.9 - 2026.6</p>
                                        <p className="text-gray-400 leading-relaxed text-sm">主修课程：设计调研方法、消费者行为学、空间信息可视化、设计市场与企业考察。</p>
                                    </div>
                                </div>
                                <div>
                                    <h2 className="text-4xl font-black text-white mb-8 uppercase tracking-tighter border-b border-white/10 pb-4">专业技能体系</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {SKILL_SYSTEM.map((skill, i) => (
                                            <div key={i} className="glass-panel p-6 rounded-xl">
                                                <h5 className="text-[#DA205A] font-bold mb-2 text-sm uppercase">{skill.title}</h5>
                                                <p className="text-gray-400 text-xs font-mono">{skill.details}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* 3. 精选作品 */}
                        <section className="py-24 px-6 md:px-12 max-w-7xl mx-auto">
                            <h2 className="text-6xl md:text-8xl font-black text-white uppercase mb-20 tracking-tighter mix-blend-difference">精选作品.</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {PROJECTS.map(p => (
                                    <div key={p.id} onClick={() => setSelectedProject(p)} className="glass-panel rounded-2xl overflow-hidden cursor-pointer group shadow-2xl transition-all hover:scale-[1.02]">
                                        <div className="h-60 overflow-hidden">
                                            <img src={p.img} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                        </div>
                                        <div className="p-6 bg-[#0a0a0a]">
                                            <h3 className="text-white font-bold text-xl mb-1">{p.title}</h3>
                                            <p className="text-[10px] text-gray-500 font-mono tracking-widest uppercase">{p.desc}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* 4. 完整联系方式 */}
                        <footer className="py-32 border-t border-white/5 bg-black/50">
                            <h2 className="text-center text-4xl font-black text-white mb-16 tracking-widest">联系我</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl mx-auto px-6">
                                {[
                                    { label: 'Phone', val: '13655004586' },
                                    { label: 'Email', val: '13655004586@163.com' },
                                    { label: 'WeChat', val: 'kotove03012' }
                                ].map((item, i) => (
                                    <div key={i} className="glass-panel p-8 rounded-3xl text-center hover:bg-white/10 transition-colors">
                                        <span className="text-gray-500 font-mono text-[10px] uppercase tracking-widest">{item.label}</span>
                                        <div className="text-white font-bold text-lg mt-2 break-all">{item.val}</div>
                                    </div>
                                ))}
                            </div>
                        </footer>
                    </main>

                    {/* 5. 详情弹窗模块 */}
                    {selectedProject && (
                        <div className="fixed inset-0 z-[100] flex justify-center items-center">
                            <div className="absolute inset-0 bg-black/95 backdrop-blur-2xl" onClick={() => setSelectedProject(null)}></div>
                            <div className="relative w-full max-w-6xl h-[90vh] bg-[#050505] overflow-y-auto custom-scrollbar border border-white/10 rounded-2xl">
                                <div className="p-8 md:p-16">
                                    <h2 className="text-5xl font-black text-white mb-8">{selectedProject.title}</h2>
                                    {!selectedProject.customSections ? (
                                        <div className="flex flex-col gap-8 pb-10">
                                            {selectedProject.detailImages.map((img, i) => <img key={i} src={img} className="w-full rounded-xl shadow-2xl" loading="lazy" />)}
                                        </div>
                                    ) : (
                                        <div className="flex flex-col gap-24 pb-10">
                                            {selectedProject.customSections.map((sec, i) => (
                                                <div key={i} className="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                                                    <div className="bg-[#0a0a0a] rounded-3xl border border-white/5 overflow-y-auto h-[60vh] hide-scrollbar">
                                                        <img src={sec.imageUrl} className="w-full h-auto" loading="lazy" />
                                                    </div>
                                                    <div>
                                                        <h4 className="font-sans font-black text-3xl uppercase mb-6" style={{color: sec.titleColor}}>{sec.subTitle}</h4>
                                                        <p className="text-gray-400 font-mono leading-loose mb-8 text-lg">{sec.desc}</p>
                                                        <div className="pt-6 border-t border-white/10 flex items-center gap-4">
                                                            <span className="text-xs text-gray-500 font-mono uppercase tracking-widest">Role:</span>
                                                            <span className="text-white font-bold">{sec.role}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <button className="fixed top-8 right-8 text-white text-3xl glass-panel w-12 h-12 rounded-full flex items-center justify-center z-[110]" onClick={() => setSelectedProject(null)}>✕</button>
                            </div>
                        </div>
                    )}
                    
                    <div id="cursor" className="fixed top-0 left-0 w-3 h-3 bg-[#DA205A] rounded-full pointer-events-none z-[1000] shadow-[0_0_15px_#DA205A]"></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        document.addEventListener('mousemove', (e) => {
            const c = document.getElementById('cursor');
            if(c) c.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
        });
    </script>
</body>
</html>

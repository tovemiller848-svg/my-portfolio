<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>叶湘榕 | 个人作品集</title>
    
    <script src="https://cdn.staticfile.org/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.staticfile.org/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.staticfile.org/babel-standalone/7.21.4/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.loli.net/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #050505; margin: 0; overflow: hidden; cursor: none; }
        .font-sans { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .glass-panel { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.06); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #DA205A; border-radius: 10px; }
        @media (max-width: 768px) { body { cursor: auto; } #cursor { display: none !important; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const THEME = { bg: '#050505', primary: '#DA205A' };

        const PROJECTS = [
            { id: 1, title: '品牌ip形象设计', img: './yunda_cover.jpg', desc: 'Ps/Gemini/Lovart', detailImages: ['./yunda_cover.jpg', './yunda_2.jpg', './yunda_3.jpg', './yunda_4.jpg', './yunda_5.jpg', './yunda_6.jpg', './yunda_7.jpg', './yunda_8.jpg'] },
            { id: 2, title: '企业宣传手册设计', img: './layout-1.jpg', desc: 'Ps/Deepseek', detailImages: ['./layout-1.jpg', './layout-2.jpg', './layout-3.jpg', './layout-4.jpg', './layout-5.jpg', './layout-6.jpg'] },
            { 
                id: 3, title: '公众号运营', img: 'https://images.unsplash.com/photo-1561070791-2526d30994b5?q=80&w=1000&auto=format&fit=crop', desc: '可画/秀米/135编辑器',
                customSections: [
                    { subTitle: '公众号视觉', title: '海报设计', desc: '提取核心元素进行视觉重构。', role: '设计', titleColor: '#2DDB84', imageUrl: './666shots-so.png' },
                    { subTitle: '公众号推文', title: '排版案例', desc: '模块化设计与视觉动线引导。', role: '排版 / 规划', titleColor: '#FFD166', imageUrl: './guoqin1.jpg' },
                    { subTitle: '活动转化', title: '& 交互交互', desc: '将普通链接转化为交互入口。', role: '链路设计', titleColor: '#FF5E3A', imageUrl: './3.png' }
                ]
            }
        ];

        function App() {
            const [heroOpacity, setHeroOpacity] = useState(1);
            const [typedText, setTypedText] = useState('');
            const [selectedProject, setSelectedProject] = useState(null);
            const heroCanvasRef = useRef(null);
            const opacityRef = useRef(1);

            useEffect(() => {
                let i = 0; const full = "艺术设计学";
                const timer = setInterval(() => { setTypedText(full.slice(0, i)); i++; if(i > full.length) clearInterval(timer); }, 150);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                const canvas = heroCanvasRef.current;
                const ctx = canvas.getContext('2d');
                let width, height;
                const isMobile = window.innerWidth < 768;
                const particleCount = isMobile ? 150 : 800; 

                const points = [];
                for (let i = 0; i < particleCount; i++) {
                    const radius = 400 * Math.cbrt(Math.random());
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(Math.random() * 2 - 1);
                    points.push({ 
                        ox: radius * Math.sin(phi) * Math.cos(theta), oy: radius * Math.sin(phi) * Math.sin(theta), oz: radius * Math.cos(phi),
                        wx: 0, wy: 0, wz: 0, size: Math.random() * 2 + 1 
                    });
                }

                const resize = () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; };
                window.addEventListener('resize', resize); resize();

                let angle = 0;
                const render = () => {
                    angle += 0.001;
                    ctx.clearRect(0, 0, width, height);
                    const fov = 600;
                    points.forEach(p => {
                        const cosY = Math.cos(angle), sinY = Math.sin(angle);
                        let tx = p.ox * cosY - p.oz * sinY;
                        let tz = p.ox * sinY + p.oz * cosY;
                        p.wx += (tx - p.wx) * 0.1; p.wy += (p.oy - p.wy) * 0.1; p.wz += (tz - p.wz) * 0.1;
                        const sc = fov / (fov + p.wz);
                        const x = p.wx * sc + width/2, y = p.wy * sc + height/2;
                        ctx.globalAlpha = Math.max(0, opacityRef.current * (sc - 0.2));
                        ctx.fillStyle = THEME.primary;
                        ctx.fillRect(x, y, p.size * sc, p.size * sc);
                    });
                    requestAnimationFrame(render);
                };
                render();
            }, []);

            return (
                <div onScroll={(e) => { const op = Math.max(0, 1 - e.target.scrollTop / 500); setHeroOpacity(op); opacityRef.current = op; }} className="relative w-full h-screen overflow-y-auto overflow-x-hidden custom-scrollbar bg-[#050505]">
                    <canvas ref={heroCanvasRef} className="fixed inset-0 w-full h-full pointer-events-none z-10" style={{ opacity: heroOpacity }} />
                    
                    <main className="relative z-20">
                        {/* 1. 英雄页 */}
                        <section className="h-screen flex flex-col items-center justify-center text-center">
                            <h1 className="font-sans font-black text-[12vw] md:text-[10vw] text-white uppercase leading-none">个人作品集<br/><span style={{color: THEME.primary}}>网站</span></h1>
                            <p className="font-mono text-gray-300 mt-8 tracking-[0.5em] text-lg uppercase">{typedText}_</p>
                        </section>

                        {/* 2. 关于我 (这就是刚才消失的部分！) */}
                        <section id="about" className="py-24 px-6 max-w-6xl mx-auto">
                            <div className="grid grid-cols-1 md:grid-cols-12 gap-12 items-start">
                                <div className="md:col-span-4 sticky top-24">
                                    <div className="glass-panel p-6 rounded-3xl text-center">
                                        <div className="w-full aspect-[3/4] rounded-2xl overflow-hidden mb-6 bg-white/5">
                                            <img src="./zheng-jian-zhao.jpg" className="w-full h-full object-cover" />
                                        </div>
                                        <h3 className="text-2xl font-black text-white">叶湘榕</h3>
                                        <p className="text-gray-500 font-mono text-xs mt-2 uppercase tracking-widest">Designer / 2003.12.23</p>
                                    </div>
                                </div>
                                <div className="md:col-span-8 flex flex-col gap-10">
                                    <div>
                                        <h2 className="text-4xl font-black text-white mb-6 uppercase tracking-tight">教育背景</h2>
                                        <div className="glass-panel p-8 rounded-2xl border-l-4 border-[#DA205A]">
                                            <div className="flex justify-between items-baseline mb-2">
                                                <h4 className="text-xl text-white font-bold">福建江夏学院</h4>
                                                <span className="text-gray-500 font-mono text-sm">2022 - 2026</span>
                                            </div>
                                            <p className="text-[#DA205A] font-bold mb-4">艺术设计学</p>
                                            <p className="text-gray-400 text-sm leading-relaxed">主修课程：设计调研方法、消费者行为学、空间信息可视化、设计市场与企业考察。</p>
                                        </div>
                                    </div>
                                    <div>
                                        <h2 className="text-4xl font-black text-white mb-6 uppercase tracking-tight">运营经历</h2>
                                        <div className="glass-panel p-8 rounded-2xl">
                                            <h4 className="text-lg text-white font-bold mb-4">公众号运营及设计</h4>
                                            <p className="text-gray-400 text-sm leading-loose">
                                                基于数据监测调整策略，策划多场线上活动。实现粉丝增长 <span className="text-white font-bold">15%</span>，互动率提升 <span className="text-white font-bold">25%</span>。擅长用户需求洞察与排版动线规划。
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* 3. 精选作品 */}
                        <section id="work" className="py-24 px-6 md:px-12 max-w-7xl mx-auto">
                            <h2 className="text-5xl md:text-7xl font-black text-white uppercase mb-20 tracking-tighter">精选作品.</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {PROJECTS.map(p => (
                                    <div key={p.id} onClick={() => setSelectedProject(p)} className="glass-panel rounded-2xl overflow-hidden cursor-pointer group shadow-2xl transition-transform hover:scale-[1.02]">
                                        <div className="h-60 overflow-hidden">
                                            <img src={p.img} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                        </div>
                                        <div className="p-6 bg-[#0a0a0a]">
                                            <h3 className="text-white font-bold text-xl mb-1">{p.title}</h3>
                                            <p className="text-[10px] text-gray-500 font-mono tracking-widest uppercase">{p.desc}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* 4. 页脚 */}
                        <footer className="py-24 border-t border-white/5 text-center">
                             <div className="flex flex-col gap-4">
                                <p className="text-gray-400 font-mono text-sm">13655004586@163.com</p>
                                <p className="text-gray-600 font-mono text-[10px] uppercase tracking-[0.3em]">© 2026 YE XIANG RONG</p>
                             </div>
                        </footer>
                    </main>

                    {/* 详情弹窗 */}
                    {selectedProject && (
                        <div className="fixed inset-0 z-[100] flex justify-center items-center">
                            <div className="absolute inset-0 bg-black/95 backdrop-blur-xl" onClick={() => setSelectedProject(null)}></div>
                            <div className="relative w-full max-w-6xl h-[90vh] bg-[#050505] overflow-y-auto custom-scrollbar border border-white/10 rounded-2xl shadow-2xl">
                                <div className="p-8 md:p-16">
                                    <h2 className="text-4xl font-black text-white mb-6">{selectedProject.title}</h2>
                                    {!selectedProject.customSections ? (
                                        <div className="flex flex-col gap-8 pb-10">
                                            {(selectedProject.detailImages || []).map((img, i) => (
                                                <img key={i} src={img} className="w-full rounded-xl" loading="lazy" />
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="flex flex-col gap-20 pb-10">
                                            {selectedProject.customSections.map((sec, i) => (
                                                <div key={i} className="grid grid-cols-1 lg:grid-cols-2 gap-10 items-center">
                                                    <div className="bg-[#0a0a0a] rounded-2xl border border-white/5 overflow-y-auto h-[50vh] hide-scrollbar">
                                                        <img src={sec.imageUrl} className="w-full h-auto" loading="lazy" />
                                                    </div>
                                                    <div>
                                                        <h4 className="font-sans font-black text-2xl uppercase mb-4" style={{color: sec.titleColor}}>{sec.subTitle}</h4>
                                                        <p className="text-gray-400 font-mono leading-relaxed mb-6">{sec.desc}</p>
                                                        <div className="text-white font-bold">Role: {sec.role}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <button className="absolute top-6 right-6 text-white text-3xl hover:text-[#DA205A]" onClick={() => setSelectedProject(null)}>✕</button>
                            </div>
                        </div>
                    )}

                    <div id="cursor" className="fixed top-0 left-0 w-3 h-3 bg-[#DA205A] rounded-full pointer-events-none z-[1000] shadow-[0_0_15px_#DA205A]"></div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        document.addEventListener('mousemove', (e) => {
            const c = document.getElementById('cursor');
            if(c) c.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
        });
    </script>
</body>
</html>
